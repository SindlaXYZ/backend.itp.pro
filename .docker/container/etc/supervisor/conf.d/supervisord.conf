; Dockraft - supervisord base configuration
; DO NOT add [program:...] blocks here - add separate .conf files in /srv/${DKZ_DOMAIN}/.docker/container/etc/supervisor/program/ instead.

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/var/run/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[include]
files=/srv/%(ENV_DKZ_DOMAIN)s/.docker/container/etc/supervisor/program/*.conf
